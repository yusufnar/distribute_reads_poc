default: &default
  adapter: postgresql_proxy
  encoding: unicode
  pool: 5
  username: postgres
  password: secret
  database: appdb

development:
  primary:
    <<: *default
    host: pg-primary
  primary_replica:
    <<: *default
    adapter: postgresql
    # Multiple replica hosts for client-side load balancing.
    # libpq randomly picks one host when opening each new read connection.
    host: pg-replica1
    #load_balance_hosts: random
    #target_session_attrs: any
    replica: true
